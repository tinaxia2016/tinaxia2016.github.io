<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">

    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-1">
        <ul class="contact-list">
            {%- if site.email -%}
            <li><a class="u-email" href="mailto:{{ site.email }}">{{ site.email }}</a></li>
            {%- endif -%}
        </ul>
      </div>

      <div class="footer-col footer-col-2" style="text-align: center;">
        {%- include social.html -%}
      </div>

      <div class="footer-col footer-col-3" style="text-align: right;">
        <a href="https://scholar.google.com/citations?view_op=list_works&hl=en&hl=en&user=YCivHUYAAAAJ&sortby=pubdate"><svg class="svg-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path fill="#828282" d="M8 0L0 4l3 1.5v3.5c0 2.5 2.2 5 5 5s5-2.5 5-5V5.5L16 4 8 0zm4 9c0 1.9-1.8 3.5-4 3.5S4 10.9 4 9V6l4 2 4-2v3z"/></svg> <span class="username">Publications</span></a>
      </div>
    </div>

  </div>

</footer>
